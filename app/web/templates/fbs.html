<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FBS — сборка</title>
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="stylesheet" href="/static/fbs.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Склад</div>
      <nav class="nav">
        <a class="nav-item nav-link" href="/">Панель</a>
        <button type="button" class="nav-item active" disabled>FBS</button>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="btn" id="btnLogout" style="width:100%;margin-bottom:0.5rem;">Выйти</button>
        <span class="muted">FBS · awaiting_deliver</span>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <h1>FBS — список и этикетки</h1>
      </header>

      <section class="view active" style="display:flex;">
        <p class="muted" style="margin:0 0 1rem;">
          Аналог команды <code>/ozon_labels</code>: список в Google Таблице (лист «FBS список…») и PDF-этикетки в порядке артикула.
        </p>

        <div class="fbs-mp-tabs" role="tablist">
          <button type="button" class="fbs-mp-tab active" data-mp="ozon" role="tab">Ozon</button>
          <button type="button" class="fbs-mp-tab" data-mp="wildberries" role="tab">Wildberries</button>
          <button type="button" class="fbs-mp-tab" data-mp="yandex_market" role="tab">Яндекс Маркет</button>
        </div>

        <div id="mp-ozon" class="fbs-mp-panel active" role="tabpanel">
          <dl class="fbs-status" id="ozonStatus">
            <div><dt>API</dt><dd id="ozonApiStatus">—</dd></div>
            <div><dt>Google Таблица</dt><dd id="ozonSheetStatus">—</dd></div>
          </dl>
          <div class="toolbar">
            <button type="button" class="btn primary" id="btnOzonGenerate">
              Сформировать список и этикетки
            </button>
            <button type="button" class="btn" id="btnOzonLabels" disabled>
              Скачать этикетки
            </button>
            <button type="button" class="btn" id="btnOzonRefreshList">Только просмотр списка</button>
          </div>
          <div id="ozonResult" class="fbs-result-box hidden">
            <h3>Результат</h3>
            <p class="muted" id="ozonSummary"></p>
            <p id="ozonSheetBlock" class="hidden">
              <strong>Лист:</strong>
              <a id="ozonSheetLink" class="fbs-sheet-link" href="#" target="_blank" rel="noopener"></a>
            </p>
            <div id="ozonWarnings" class="movement-warnings hidden"></div>
            <div class="table-wrap" style="margin-top:1rem;">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>№</th>
                    <th>Артикул</th>
                    <th class="num">Кол-во</th>
                    <th>Номер отправления</th>
                  </tr>
                </thead>
                <tbody id="ozonListBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="mp-wildberries" class="fbs-mp-panel" role="tabpanel">
          <p class="muted">Раздел в разработке.</p>
          <div class="toolbar">
            <button type="button" class="btn primary">Сформировать список и этикетки</button>
            <button type="button" class="btn">Скачать этикетки</button>
          </div>
        </div>

        <div id="mp-yandex_market" class="fbs-mp-panel" role="tabpanel">
          <p class="muted">Раздел в разработке.</p>
          <div class="toolbar">
            <button type="button" class="btn primary">Сформировать список и этикетки</button>
            <button type="button" class="btn">Скачать этикетки</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/fbs.js"></script>
</body>
</html>
